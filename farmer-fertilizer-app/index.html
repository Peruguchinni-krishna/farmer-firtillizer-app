<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fertilizer Predictor</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4CAF50">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="topbar">
    <div>
      <h1>🌾 Fertilizer Recommendation System</h1>
      <p>Fill the form to get crop-specific fertilizer guidance.</p>
    </div>
    <a class="nav-link" href="dashboard.html">Dashboard</a>
  </header>

  <main>
    <section class="card">
      <h2>Crop & Soil Data</h2>
      <form id="fertilizerForm">
        <input type="text" id="crop" placeholder="Crop Type" required>
        <input type="text" id="soil" placeholder="Soil Type" required>

        <div class="row">
          <input type="number" id="nitrogen" placeholder="Nitrogen (N)" required min="0">
          <input type="number" id="phosphorus" placeholder="Phosphorus (P)" required min="0">
        </div>

        <div class="row">
          <input type="number" id="potassium" placeholder="Potassium (K)" required min="0">
          <input type="number" id="temp" placeholder="Temperature °C" required step="0.1">
        </div>

        <input type="number" id="humidity" placeholder="Humidity %" required min="0" max="100" step="0.1">

        <button type="submit">Predict Fertilizer</button>
      </form>
    </section>

    <section class="card">
      <h2>Recommendation</h2>
      <div id="result" class="result-card">Submit crop and soil details to see fertilizer advice.</div>
    </section>

    <section class="card history-card">
      <h2>Recent Predictions</h2>
      <ul id="historyList" class="history-list"></ul>
    </section>
  </main>

  <script src="js/ui.js"></script>
  <script src="js/predict.js"></script>
  <script src="js/app.js"></script>
  <link rel="manifest" href="/manifest.json">ssss
</body>

</html>
